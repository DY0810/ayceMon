name: Build & Push Docker Image
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            GIT_SHA=${{ github.sha }}

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      # Authenticate the runner against GCP using the github-deployer
      # service account. The SA has roles/container.clusterViewer +
      # roles/container.developer on the project — enough to fetch
      # cluster credentials and roll a Deployment, nothing more.
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # Installs gke-gcloud-auth-plugin + writes a kubeconfig that
      # targets the specified GKE cluster. This replaces the old
      # base64-KUBE_CONFIG dance, which broke on GKE because stock
      # kubectl can't auth against GKE without the plugin.
      - name: Fetch GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          cluster_name: ${{ vars.GKE_CLUSTER_NAME }}
          location: ${{ vars.GKE_CLUSTER_REGION }}

      - name: Deploy to GKE
        run: |
          # Docker/OCI require lowercase image names. github.repository
          # preserves the repo's casing (DY0810/ayceMon), so we must
          # lowercase it explicitly — the build job's metadata-action
          # already lowercases before pushing to GHCR.
          IMAGE_LOWER=$(echo "${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          IMAGE="${{ env.REGISTRY }}/${IMAGE_LOWER}:sha-$(echo $GITHUB_SHA | cut -c1-7)"
          kubectl set image deployment/aycemon aycemon=$IMAGE -n aycemon
          kubectl rollout status deployment/aycemon -n aycemon --timeout=240s
