apiVersion: v1
kind: Secret
metadata:
  name: aycemon-secrets
  namespace: aycemon
type: Opaque
data:
  SUPABASE_SERVICE_ROLE_KEY: # REPLACE with base64-encoded value
  GOOGLE_PLACES_API_KEY: # REPLACE with base64-encoded value
  # Optional. When set, /api/metrics returns Prometheus text-format metrics
  # for callers presenting `Authorization: Bearer <token>`. When unset (or
  # absent from the Secret data), /api/metrics returns 404 and no scraping
  # can succeed. Generate with:
  #   openssl rand -base64 32 | tr -d '=+/' | cut -c1-32
  # Then base64-encode the result for this field. Rotation: see
  # docs/k8s-runbook.md §6.
  METRICS_SCRAPE_TOKEN: # REPLACE with base64-encoded value (optional)
