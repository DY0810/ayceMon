apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aycemon-ingress
  namespace: aycemon
  annotations:
    # Staging until a public hostname is wired. See
    # k8s/cert-manager/cluster-issuer.yaml for the activation checklist
    # before flipping to letsencrypt-prod.
    cert-manager.io/cluster-issuer: letsencrypt-prod
    # Both annotations are set intentionally (not redundantly):
    # - ssl-redirect fires only when ingress-nginx terminates TLS directly.
    # - force-ssl-redirect fires unconditionally — required when a cloud
    #   load balancer in front terminates TLS and forwards plain HTTP, a
    #   topology in which ssl-redirect alone would never fire.
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    # Hide the Prometheus scrape endpoint from the public internet. The
    # in-app /api/metrics handler already gates on METRICS_SCRAPE_TOKEN
    # (returns 401 without a valid bearer), but cluster-internal scrapes
    # from Prometheus Operator bypass the Ingress entirely — they go
    # pod-IP → pod-IP via the ServiceMonitor. There is no reason to leave
    # /api/metrics reachable from the internet; doing so only gives
    # attackers a chance to probe the 401 vs 404 behaviour and measure
    # token-comparison timing.
    nginx.ingress.kubernetes.io/server-snippet: |
      location = /api/metrics {
        return 403;
      }
      location = /api/metrics/ {
        return 403;
      }
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - aycemon.34-105-65-50.nip.io
      secretName: aycemon-tls
  rules:
    - host: aycemon.34-105-65-50.nip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: aycemon-service
                port:
                  number: 80
