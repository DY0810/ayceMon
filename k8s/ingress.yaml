apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aycemon-ingress
  namespace: aycemon
  annotations:
    # Staging until a public hostname is wired. See
    # k8s/cert-manager/cluster-issuer.yaml for the activation checklist
    # before flipping to letsencrypt-prod.
    cert-manager.io/cluster-issuer: letsencrypt-staging
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - aycemon.local
      secretName: aycemon-tls
  rules:
    - host: aycemon.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: aycemon-service
                port:
                  number: 80
