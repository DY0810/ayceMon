apiVersion: apps/v1
kind: Deployment
metadata:
  name: aycemon
  namespace: aycemon
  labels:
    app: aycemon
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aycemon
  template:
    metadata:
      labels:
        app: aycemon
    spec:
      containers:
        - name: aycemon
          image: ghcr.io/dy0810/aycemon:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: aycemon-config
            - secretRef:
                name: aycemon-secrets
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
