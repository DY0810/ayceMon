# Baseline: deny every pod in the namespace by default. The per-workload
# policy below opens specific ingress/egress for the aycemon pods; any
# other pod that lands in the namespace (migration job, debug shell,
# future workload) inherits the deny until it ships its own policy.
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: aycemon
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: aycemon-netpol
  namespace: aycemon
spec:
  podSelector:
    matchLabels:
      app: aycemon
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
          podSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
      ports:
        - protocol: TCP
          port: 3000
    # Prometheus Operator scrape of /api/metrics. The endpoint itself is
    # gated by METRICS_SCRAPE_TOKEN so even if this selector widens to
    # include a hostile namespace, the response is a 401 rather than a
    # data leak. The selector uses the automatic
    # `kubernetes.io/metadata.name` label so a workload cannot mint a
    # namespace with a fake name to bypass it. If the operator is deployed
    # outside the `monitoring` namespace, widen this rule explicitly
    # (do NOT drop the namespaceSelector — that would allow any pod in the
    # cluster to scrape).
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 3000
  egress:
    # DNS — restricted to kube-system CoreDNS pods. The
    # kubernetes.io/metadata.name label is a Kubernetes v1.22+ automatic
    # NamespaceDefaultLabel and cannot be overwritten by workloads.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # HTTPS egress to external third-party services:
    #   *.supabase.co          — database, auth, storage
    #   *.upstash.io           — rate limiter (Redis REST + TCP 6379 TLS)
    #   places.googleapis.com  — restaurant search
    #
    # NetworkPolicy v1 cannot restrict by FQDN: the spec only supports
    # podSelector / namespaceSelector / ipBlock in the `to` field.
    # CDN-backed endpoints (especially Upstash + googleapis.com) resolve
    # to dynamic IP ranges, so pinning to ipBlock is unmaintainable.
    #
    # For an FQDN-tight egress policy, use k8s/cilium-networkpolicy.yaml
    # on a cluster running Cilium CNI. On vanilla kindnet / kube-proxy
    # this broader TCP/443 rule is the safest honest policy.
    - ports:
        - protocol: TCP
          port: 443
    # GKE Autopilot enables NodeLocal DNSCache by default — pod
    # resolv.conf nameserver is 169.254.20.10, a link-local IP served
    # by a DaemonSet pod on each node. The kube-dns pod-selector above
    # doesn't match node-local-dns, so an ipBlock rule is required or
    # every DNS lookup times out with EAI_AGAIN. (169.254.20.10 is
    # hard-coded by GKE's NodeLocal DNS controller; it doesn't change
    # across upgrades.)
    - to:
        - ipBlock:
            cidr: 169.254.20.10/32
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
# cert-manager ACME HTTP-01 solver. cert-manager creates a transient
# Pod + Ingress at `/.well-known/acme-challenge/<token>` for each cert
# issuance/renewal. The solver pod carries the label
# `acme.cert-manager.io/http01-solver=true` (not `app=aycemon`), so the
# default-deny-all policy blocks it and the challenge self-check fails
# with "context deadline exceeded". This rule opens port 8089 from the
# ingress-nginx namespace to solver pods specifically.
#
# Without this rule, the cert-manager bootstrap on a fresh cluster stalls
# indefinitely at challenge phase.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-acme-http01-solver
  namespace: aycemon
spec:
  podSelector:
    matchLabels:
      acme.cert-manager.io/http01-solver: "true"
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8089
