apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: aycemon-netpol
  namespace: aycemon
spec:
  podSelector:
    matchLabels:
      app: aycemon
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - protocol: TCP
          port: 3000
  egress:
    # DNS resolution
    - ports:
        - protocol: TCP
          port: 53
        - protocol: UDP
          port: 53
    # HTTPS for Supabase and Google Places API
    - ports:
        - protocol: TCP
          port: 443
