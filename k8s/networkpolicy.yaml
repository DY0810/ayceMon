# Baseline: deny every pod in the namespace by default. The per-workload
# policy below opens specific ingress/egress for the aycemon pods; any
# other pod that lands in the namespace (migration job, debug shell,
# future workload) inherits the deny until it ships its own policy.
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: aycemon
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: aycemon-netpol
  namespace: aycemon
spec:
  podSelector:
    matchLabels:
      app: aycemon
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
          podSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
      ports:
        - protocol: TCP
          port: 3000
    # Prometheus Operator scrape of /api/metrics. The endpoint itself is
    # gated by METRICS_SCRAPE_TOKEN so even if this selector widens to
    # include a hostile namespace, the response is a 401 rather than a
    # data leak. The selector uses the automatic
    # `kubernetes.io/metadata.name` label so a workload cannot mint a
    # namespace with a fake name to bypass it. If the operator is deployed
    # outside the `monitoring` namespace, widen this rule explicitly
    # (do NOT drop the namespaceSelector — that would allow any pod in the
    # cluster to scrape).
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 3000
  egress:
    # DNS — restricted to kube-system CoreDNS pods. The
    # kubernetes.io/metadata.name label is a Kubernetes v1.22+ automatic
    # NamespaceDefaultLabel and cannot be overwritten by workloads.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # HTTPS egress to external third-party services:
    #   *.supabase.co          — database, auth, storage
    #   *.upstash.io           — rate limiter (Redis REST + TCP 6379 TLS)
    #   places.googleapis.com  — restaurant search
    #
    # NetworkPolicy v1 cannot restrict by FQDN: the spec only supports
    # podSelector / namespaceSelector / ipBlock in the `to` field.
    # CDN-backed endpoints (especially Upstash + googleapis.com) resolve
    # to dynamic IP ranges, so pinning to ipBlock is unmaintainable.
    #
    # For an FQDN-tight egress policy, use k8s/cilium-networkpolicy.yaml
    # on a cluster running Cilium CNI. On vanilla kindnet / kube-proxy
    # this broader TCP/443 rule is the safest honest policy.
    - ports:
        - protocol: TCP
          port: 443
